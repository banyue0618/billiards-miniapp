## ---- 基础 ----
log.level = warning

## ---- Dashboard ----
dashboard.enable = true

## ---- 认证（用户名密码）----
allow_anonymous = false
password_hash.algorithm = sha256

## ---- 关闭规则引擎（省内存）----
modules.rule_engine.enable = false

## ---- MQTT 会话与离线消息 ----
mqtt.session.expiry_interval = 86400     # 离线消息保留 1 天
mqtt.max_queued_messages = 100           # 设备少，100 条够用
mqtt.client.keepalive = 120              # 心跳 2 分钟

## ---- 连接限制（因设备少）----
listener.tcp.external.max_connections = 100
listener.ws.external.max_connections = 100

## ---- 限制 Erlang 调度器 CPU 使用 ----
erlang.schedulers.online = 1
node.process_limit = 4096
node.max_ports = 2048
