# =========================================
# 台球厅SaaS系统 Docker Compose 配置文件
# =========================================
# 此文件定义了整个系统的所有服务容器
# 包括：前端UI、后端应用、MySQL数据库、Redis缓存

# =========================================
# 服务定义
# =========================================
services:

  # =====================================
  # 后端应用服务
  # =====================================
  billiards-admin:
    # 使用本地Dockerfile构建镜像
    build:
      context: .                              # 构建上下文为当前目录
      dockerfile: ruoyi-admin/Dockerfile      # 指定Dockerfile路径

    container_name: ${PROJECT_NAME}-admin     # 容器名称
    restart: always                           # 容器自动重启策略

    # 端口映射：宿主机端口:容器端口
    ports:
      - ${APP_HOST_PORT}:${APP_CONTAINER_PORT}  # Spring Boot应用端口

    # 环境变量配置
    environment:
      # Spring Boot 配置
      - SPRING_PROFILES_ACTIVE=prod          # 使用生产环境配置
      - SERVER_PORT=8080

      # 数据库连接配置（使用专用用户）
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_ADMIN_USERNAME=billiards_admin
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_ADMIN_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_PLATFORM_USERNAME=billiards_admin
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_PLATFORM_PASSWORD=${MYSQL_ROOT_PASSWORD}

      # Redis连接配置（使用容器服务名）
      - SPRING_REDIS_HOST=redis              # Redis主机名（容器服务名）
      - SPRING_REDIS_PORT=6379               # Redis端口
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD}  # Redis密码

      # 文件上传配置
      - RESOURCE_STORAGE_LOCAL_BASE_URL=${UPLOAD_PREFIX}  # 文件访问URL前缀

      # JVM调优参数
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC

      # 其他自定义配置
      - SSE_ENABLED=false
      - BILLIARDS_WECHAT_APPID=${BILLIARDS_WECHAT_APPID}
      - BILLIARDS_WECHAT_SECRET=${BILLIARDS_WECHAT_SECRET}

    # 数据卷挂载：宿主机路径:容器路径
    volumes:
      - ${PROJECT_ROOT_DIR}/logs:/app/logs                     # 应用日志挂载
      - ${PROJECT_ROOT_DIR}/uploads:/app/uploads               # 文件上传目录挂载

    # 服务依赖：确保依赖服务健康后再启动
    depends_on:
      mysql:
        condition: service_healthy           # 等待MySQL健康检查通过
      redis:
        condition: service_healthy           # 等待Redis健康检查通过

    # 加入自定义网络
    networks:
      - billiards-network

    # 健康检查配置
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "ruoyi:123456", "http://localhost:8080/actuator/health"]
      interval: 30s                          # 检查间隔
      timeout: 10s                           # 超时时间
      retries: 3                             # 重试次数
      start_period: 90s                      # 启动等待时间

  # =====================================
  # MySQL 数据库服务
  # =====================================
  mysql:
    image: mysql:5.7                         # 使用MySQL 5.7镜像
    container_name: ${PROJECT_NAME}-mysql    # 容器名称
    restart: always                          # 自动重启

    # 端口映射
    ports:
      - ${MYSQL_HOST_PORT}:${MYSQL_CONTAINER_PORT}                        # MySQL端口

    # 环境变量配置
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}  # root用户密码
      - MYSQL_DATABASE=billiards_admin       # 默认创建的数据库
      - MYSQL_USER=billiards_admin           # 应用用户
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}  # 应用用户密码
      - MYSQL_ROOT_HOST=%                    # 允许root远程连接
      - TZ=Asia/Shanghai                     # 时区设置

    # MySQL启动参数配置
    command:
      - --character-set-server=utf8mb4       # 字符集设置
      - --collation-server=utf8mb4_unicode_ci # 排序规则
      - --lower_case_table_names=1           # 表名不区分大小写
      - --max_connections=200                # 最大连接数
      - --innodb-buffer-pool-size=256M       # InnoDB缓冲池大小
      - --query-cache-size=32M               # 查询缓存大小
      - --slow-query-log=1                   # 开启慢查询日志
      - --slow-query-log-file=/var/lib/mysql/slow.log  # 慢查询日志文件
      - --long_query_time=2                  # 慢查询时间阈值（秒）
      - --default-authentication-plugin=mysql_native_password  # 认证插件
      - --bind-address=0.0.0.0               # 允许所有IP连接

    # 数据卷挂载
    volumes:
      - mysql-data:/var/lib/mysql            # 数据持久化
      - ./script/temp_sql/:/docker-entrypoint-initdb.d/  # SQL初始化脚本
      - ./mysql-config/:/etc/mysql/conf.d/   # MySQL配置文件

    # 健康检查
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s                          # 检查间隔
      timeout: 5s                            # 超时时间
      retries: 5                             # 重试次数
      start_period: 30s                      # 启动等待时间

    # 加入自定义网络
    networks:
      - billiards-network

  # =====================================
  # Redis 缓存服务
  # =====================================
  redis:
    image: redis:5.0.14-alpine              # 使用Alpine版本（更小体积）
    container_name: ${PROJECT_NAME}-redis   # 容器名称
    restart: always                         # 自动重启

    # 端口映射
    ports:
      - ${REDIS_HOST_PORT}:${REDIS_CONTAINER_PORT}                         # Redis端口

    # Redis启动命令（配置密码和持久化）
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    # 数据卷挂载
    volumes:
      - redis-data:/data                     # Redis数据持久化
      - redis-logs:/var/log/redis            # Redis日志

    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s                          # 检查间隔
      timeout: 3s                            # 超时时间
      retries: 5                             # 重试次数
      start_period: 10s                      # 启动等待时间

    # 加入自定义网络
    networks:
      - billiards-network

  # =====================================
  # Nginx服务
  # =====================================
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${PROJECT_ROOT_DIR}/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${PROJECT_ROOT_DIR}/nginx/conf:/etc/nginx/conf:ro
      - ${PROJECT_ROOT_DIR}/uploads:/var/www/uploads:ro
      - ${PROJECT_ROOT_DIR}/web:/var/www/web:ro
      - ${PROJECT_ROOT_DIR}/nginx/cert:/etc/nginx/cert:ro
    depends_on:
      - billiards-admin
    networks:
      - billiards-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "-H", "Host: ${DOMAIN_NAME}", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

# =========================================
# 网络配置
# =========================================
networks:
  billiards-network:
    driver: bridge                           # 使用桥接网络驱动

# =========================================
# 数据卷配置
# =========================================
volumes:
  mysql-data:
    name: ${PROJECT_NAME}-mysql-data
  redis-data:
    name: ${PROJECT_NAME}-redis-data
  redis-logs:
    name: ${PROJECT_NAME}-redis-log

# =========================================
# 使用说明
# =========================================
#
# 启动所有服务：
#   docker-compose up -d
#
# 查看服务状态：
#   docker-compose ps
#
# 查看服务日志：
#   docker-compose logs -f billiards-admin
#   docker-compose logs -f mysql
#   docker-compose logs -f redis
#
# 停止所有服务：
#   docker-compose down
#
# 重新构建并启动：
#   docker-compose up -d --build
#
# 进入容器：
#   docker-compose exec billiards-admin bash
#   docker-compose exec mysql mysql -u root -ppassword
#   docker-compose exec redis redis-cli -a password
#
# 清理数据卷（谨慎使用）：
#   docker-compose down -v
