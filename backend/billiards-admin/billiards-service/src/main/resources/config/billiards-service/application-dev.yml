# 开发环境配置

# Spring配置
spring:
  # 数据源配置
  datasource:
    dynamic:
      druid:
        initial-size: 5
        min-idle: 5
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        validation-query: SELECT 1 FROM DUAL
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        filter:
          slf4j:
            enabled: true
            statement-log-enabled: true
            statement-executable-sql-log-enable: true
      primary: admin
      datasource:
        admin:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://localhost:3306/billiards_admin?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
          username: root
          password: root123456
        platform:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://localhost:3306/billiards_saas?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
          username: root
          password: root123456

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# 日志配置
logging:
  level:
    com.banyue.billiards: debug
    org.springframework: info
    com.baomidou.mybatisplus: debug
    org.mybatis: debug

# Sa-Token配置
sa-token:
  # 开发环境下打印操作日志
  is-log: true
  is-print: true
