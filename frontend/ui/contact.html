<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>联系客服 - 台球神探</title>
    <style>
        :root {
            --system-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --primary-color: #007AFF; /* Apple Blue */
            --secondary-color: #8E8E93; /* Apple Gray */
            --background-color: #F9F9F9; /* Slightly off-white like iOS settings */
            --card-background-color: #FFFFFF;
            --border-color: #E5E5EA;
            --text-color: #1C1C1E;
            --header-bg-color: rgba(249, 249, 249, 0.8); /* Translucent header */
            --safe-area-inset-top: env(safe-area-inset-top, 20px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 20px);
        }

        body {
            font-family: var(--system-font);
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-top: var(--safe-area-inset-top);
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background-color: var(--header-bg-color);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: var(--safe-area-inset-top);
            z-index: 10;
            height: 44px; /* Standard iOS nav bar height */
        }

        .back-button {
            font-size: 17px;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .back-button svg {
            width: 12px;
            height: 20px;
            margin-right: 5px;
        }

        .page-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-color);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .content-area {
            padding: 20px 16px;
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }

        .contact-section {
            background-color: var(--card-background-color);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .contact-item-icon {
            font-size: 22px;
            margin-right: 15px;
            width: 24px;
            text-align: center;
        }

        .contact-item-label {
            font-size: 15px;
            color: var(--secondary-color);
            flex-shrink: 0;
            width: 80px;
        }

        .contact-item-value {
            font-size: 16px;
            color: var(--text-color);
            word-break: break-all;
        }
        .contact-item-value a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .map-placeholder {
            height: 150px;
            background-color: var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary-color);
            font-size: 14px;
            margin-top: 20px;
        }

    </style>
</head>
<body>
    <div class="top-nav">
        <a href="my.html" class="back-button">
            <svg viewBox="0 0 13 21" xmlns="http://www.w3.org/2000/svg"><path d="M11.5 20.5L1.5 10.5L11.5 0.5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            返回
        </a>
        <span class="page-title">联系客服</span>
    </div>

    <div class="content-area">
        <div class="contact-section">
            <div class="contact-item">
                <span class="contact-item-icon">📞</span>
                <span class="contact-item-label">客服热线</span>
                <span class="contact-item-value"><a href="tel:400-123-4567">400-123-4567</a></span>
            </div>
            <div class="contact-item">
                <span class="contact-item-icon">📧</span>
                <span class="contact-item-label">电子邮箱</span>
                <span class="contact-item-value"><a href="mailto:support@examplebilliards.com">support@examplebilliards.com</a></span>
            </div>
            <div class="contact-item">
                <span class="contact-item-icon">💬</span>
                <span class="contact-item-label">在线客服</span>
                <span class="contact-item-value"><a href="#chat">点击开始在线咨询</a></span>
            </div>
             <div class="contact-item">
                <span class="contact-item-icon">⏰</span>
                <span class="contact-item-label">服务时间</span>
                <span class="contact-item-value">周一至周日 9:00 - 22:00</span>
            </div>
        </div>

        <div class="map-placeholder">
            📍 我们的位置 (地图占位)
        </div>
    </div>

</body>
</html>
