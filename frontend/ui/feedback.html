<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>自助台球厅 - 意见反馈</title>
    <style>
        :root {
            --system-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            --primary-text-color: #1d1d1f;
            --secondary-text-color: #6e6e73;
            --tertiary-text-color: #86868b;
            --background-color: #f0f0f5; 
            --card-background-color: #ffffff;
            --border-color: #d2d2d7;
            --interactive-color: #007aff; 
            --placeholder-text-color: #c7c7cd; /* iOS placeholder text color */
        }

        body {
            font-family: var(--system-font);
            margin: 0;
            background-color: var(--background-color);
            color: var(--primary-text-color);
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        .page-header-container {
            position: sticky; 
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background-color: rgba(249, 249, 249, 0.85); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 0.5px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 10px;
            height: 44px;
        }
        .back-button {
            font-size: 17px;
            color: var(--interactive-color);
            text-decoration: none;
            padding: 8px 10px 8px 0;
            line-height: 1;
        }
        .page-header-title {
            flex-grow: 1; 
            padding: 0 16px; 
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            color: var(--primary-text-color);
            position: absolute; 
            left: 50%;
            transform: translateX(-50%);
            width: fit-content; 
            max-width: calc(100% - 120px); 
        }

        .scrollable-content {
            flex-grow: 1;
            overflow-y: auto; 
            padding: 20px 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            font-family: var(--system-font);
            font-size: 16px;
            border: 0.5px solid var(--border-color);
            border-radius: 8px;
            min-height: 150px;
            resize: vertical;
            background-color: var(--card-background-color);
            color: var(--primary-text-color);
        }
        .form-group textarea::placeholder {
            color: var(--placeholder-text-color);
        }
        
        .form-group input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            font-family: var(--system-font);
            font-size: 16px;
            border: 0.5px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-background-color);
            color: var(--primary-text-color);
        }
        .form-group input[type="text"]::placeholder {
            color: var(--placeholder-text-color);
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: var(--secondary-text-color);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .submit-button {
            background-color: var(--interactive-color);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .submit-button:active {
            background-color: #005bb5; /* Darker blue on press */
        }

    </style>
</head>
<body>
    <div class="page-header-container">
        <a href="my.html" class="back-button">‹ 返回</a>
        <div class="page-header-title">意见反馈</div>
    </div>

    <div class="scrollable-content">
        <div class="form-group">
            <label class="form-label" for="feedback-text">反馈内容</label>
            <textarea id="feedback-text" placeholder="请输入您的宝贵意见或建议，我们将努力改进（200字以内）" rows="6"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label" for="contact-info">联系方式 (选填)</label>
            <input type="text" id="contact-info" placeholder="邮箱或手机号，方便我们与您联系">
        </div>
        <button class="submit-button">提交反馈</button>
    </div>
</body>
</html>
