<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级抽奖系统</title>
    <link rel="stylesheet" href="lottery.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="class-name">请选择学生名单文件</h1>
            <div class="file-input-container">
                <input type="file" id="file-input" accept=".txt" />
                <label for="file-input" class="file-label">选择学生名单文件</label>
            </div>
        </header>
        
        <main>
            <div class="button-container">
                <button id="lottery-btn" class="lottery-btn"><span>开始点名</span></button>
            </div>
            
            <div id="lottery-container" class="lottery-container">
                <div class="lottery-box">
                    <div class="highlight-band"></div>
                    <div id="names-container" class="names-container">
                        <!-- 名字将在JS中动态插入 -->
                    </div>
                </div>
            </div>
            
            <div id="result-container" class="result-container">
                <div id="result" class="result"></div>
                <div id="congratulation" class="congratulation"></div>
            </div>
        </main>
        
        <footer>
            <p>让课堂更有趣</p>
        </footer>
    </div>

    <audio id="spin-sound" src="sounds/roll.mp3" preload="auto"></audio>
    <audio id="win-sound" src="sounds/finish.mp3" preload="auto"></audio>

    <script src="lottery.js"></script>
</body>
</html>
